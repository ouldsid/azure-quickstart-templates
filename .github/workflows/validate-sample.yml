name: Validate Sample

# GitHub-only static validation — no Azure DevOps, no Azure credentials, no live deployment.
# Checks: Bicep build, metadata.json schema, README badges, ARM TTK best-practices, Test-LocalSample.
#
# To run/debug locally, try https://github.com/nektos/act
# Actions documentation: https://docs.github.com/en/actions/reference

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write  # required to post the summary comment

jobs:
  validate:
    name: Validate Sample
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:

      # ── Phase 1: Environment Setup ───────────────────────────────────────────

      - name: Checkout branch
        uses: actions/checkout@v2.3.4
        with:
          fetch-depth: 0  # full history needed for git diff

      - name: Fetch master for diff
        run: git fetch origin master --depth=1

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v1.8.0

      - name: Install TTK
        run: |
          TTK_FOLDER="$RUNNER_TEMP/arm-ttk"
          TTK_URI="https://aka.ms/arm-ttk-latest"

          curl -sLo arm-ttk.zip "$TTK_URI"
          unzip -q arm-ttk.zip -d "$TTK_FOLDER"
          rm arm-ttk.zip
          echo "TTK_FOLDER=$TTK_FOLDER" >> $GITHUB_ENV

      - name: Install Bicep CLI
        run: |
          INSTALL_PATH="$RUNNER_TEMP/bicep"
          BICEP_PATH="$RUNNER_TEMP/bicep/bicep"
          mkdir -p "$INSTALL_PATH"

          curl -sLo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x ./bicep
          sudo mv ./bicep "$INSTALL_PATH"
          echo "Using bicep at $BICEP_PATH:"
          "$BICEP_PATH" --version

          echo "BICEP_PATH=$BICEP_PATH" >> $GITHUB_ENV

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https software-properties-common
          wget -q https://packages.microsoft.com/config/ubuntu/16.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      # ── Phase 2: Sample Discovery ─────────────────────────────────────────────

      - name: Find changed sample folder
        run: |
          cd "$GITHUB_WORKSPACE"

          # Files changed in this branch vs master, excluding non-sample paths
          CHANGED_FILES=$(git diff --name-only origin/master...HEAD -- \
            | grep -v "^\.github/" \
            | grep -v "^test/" \
            | grep -v "^1-CONTRIBUTION-GUIDE/" \
            || true)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Collapse to unique top-level sample folders (depth-2 prefix, e.g. quickstarts/foo)
          SAMPLE_FOLDERS=$(echo "$CHANGED_FILES" \
            | awk -F'/' 'NF>=2 {print $1"/"$2}' \
            | sort -u)
          FOLDER_COUNT=$(echo "$SAMPLE_FOLDERS" | grep -c . || true)

          echo "Candidate sample folders ($FOLDER_COUNT): $SAMPLE_FOLDERS"

          if [ "$FOLDER_COUNT" -ne 1 ]; then
            echo "::error::Expected exactly 1 changed sample folder, found $FOLDER_COUNT. Please limit each PR to a single sample."
            exit 1
          fi

          SAMPLEFOLDER_PATH=$(echo "$SAMPLE_FOLDERS" | head -1)
          MAINBICEP_PATH="$SAMPLEFOLDER_PATH/main.bicep"
          AZDEPLOYJSON_PATH="$SAMPLEFOLDER_PATH/azuredeploy.json"

          echo "SAMPLEFOLDER_PATH=$SAMPLEFOLDER_PATH" >> $GITHUB_ENV
          echo "MAINBICEP_PATH=$MAINBICEP_PATH"         >> $GITHUB_ENV
          echo "AZDEPLOYJSON_PATH=$AZDEPLOYJSON_PATH"   >> $GITHUB_ENV

          echo "Sample folder: $SAMPLEFOLDER_PATH"

      - name: Check language support (Bicep / JSON)
        run: |
          BICEP_SUPPORTED=false
          if [ -f "$MAINBICEP_PATH" ]; then
            BICEP_SUPPORTED=true
          fi
          echo "BICEP_SUPPORTED=$BICEP_SUPPORTED" >> $GITHUB_ENV
          echo "Bicep supported: $BICEP_SUPPORTED"

      # ── Phase 3: Static Validation ────────────────────────────────────────────

      - name: Build main.bicep -> azuredeploy.json
        if: env.BICEP_SUPPORTED == 'true'
        run: |
          echo "Running: bicep build $MAINBICEP_PATH --outfile $AZDEPLOYJSON_PATH"
          "$BICEP_PATH" build "$MAINBICEP_PATH" --outfile "$AZDEPLOYJSON_PATH"

      - name: Validate metadata.json
        run: |
          pwsh -noprofile -nologo -command "
            \$ErrorActionPreference = 'Stop'
            & '$GITHUB_WORKSPACE/test/ci-scripts/Validate-Metadata.ps1' \
              -SampleFolder '${{ env.SAMPLEFOLDER_PATH }}' \
              -RepoRoot '$GITHUB_WORKSPACE'
          "

      - name: Validate README.md
        run: |
          pwsh -noprofile -nologo -command "
            \$ErrorActionPreference = 'Stop'
            & '$GITHUB_WORKSPACE/test/ci-scripts/Validate-ReadMe.ps1' \
              -SampleFolder '${{ env.SAMPLEFOLDER_PATH }}' \
              -RepoRoot '$GITHUB_WORKSPACE'
          "

      - name: Run ARM TTK best practices tests
        run: |
          pwsh -noprofile -nologo -command "
            \$ErrorActionPreference = 'Stop'
            & '$GITHUB_WORKSPACE/test/ci-scripts/Test-BestPractices.ps1' \
              -SampleFolder '${{ env.SAMPLEFOLDER_PATH }}' \
              -TtkFolder '${{ env.TTK_FOLDER }}' \
              -BicepPath '${{ env.BICEP_PATH }}'
          "

      - name: Run full local sample validation
        run: |
          pwsh -noprofile -nologo -command "
            & '$GITHUB_WORKSPACE/test/ci-scripts/Test-LocalSample.ps1' \
              '${{ env.SAMPLEFOLDER_PATH }}' \
              -TtkFolder '${{ env.TTK_FOLDER }}'
            if (\$error.Count) { exit 1 }
          "

      # ── Phase 4: Reporting ────────────────────────────────────────────────────

      - name: Post summary comment
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            const outcome = success
              ? '✅ All validation checks passed.'
              : '❌ One or more validation checks failed — see the workflow run logs for details.';
            const sample = '${{ env.SAMPLEFOLDER_PATH }}' || '(unknown)';
            const body = [
              `### Validate Sample — ${outcome}`,
              '',
              `**Sample:** \`${sample}\``,
              '',
              '**Checks run:**',
              '- Bicep build (`main.bicep → azuredeploy.json`, if `main.bicep` present)',
              '- `Validate-Metadata.ps1` — metadata.json schema validation',
              '- `Validate-ReadMe.ps1` — README badge and button checks',
              '- `Test-BestPractices.ps1` — ARM TTK best-practices (`Test-AzTemplate`)',
              '- `Test-LocalSample.ps1` — combined local validation',
            ].join('\n');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
